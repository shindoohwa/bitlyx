        content="Create high-quality QR codes for URLs, text, or contact info instantly. Customize colors, size, and download as PNG. Free and privacy-focused.">

        content="Create high-quality QR codes for URLs, text, or contact info instantly. Customize colors, size, and download as PNG." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "QR Code Generator",
      "operatingSystem": "All",
      "applicationCategory": "DeveloperApplication",
      "description": "Generate custom QR codes online for free.",
      "url": "https://bitlyx.vercel.app/qr-generator.html"
    }
    </script>

    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <header>
            <div class="logo"><a href="/">bitlyx</a></div>
            <nav id="main-nav">
                <a href="/json-parser.html" class="nav-link">JSON Parser</a>
                <a href="/crypto-encoder.html" class="nav-link">Encoder</a>
                <a href="/crypto-decoder.html" class="nav-link">Decoder</a>
                <a href="/unix-timestamp.html" class="nav-link">Timestamp</a>
                <a href="/base-converter.html" class="nav-link">Base Converter</a>
                <a href="/qr-generator.html" class="nav-link active">QR Generator</a>
            </nav>
        </header>

        <main>
            <section id="qr-generator" class="page-content">
                <div class="tool-header">
                    <h1>QR Code Generator</h1>
                    <p>Enter text or URL to generate a custom QR code.</p>
                </div>

                <div class="qr-container split-layout">
                    <div class="qr-inputs">
                        <div class="input-group">
                            <label for="qr-text">Content (URL or Text)</label>
                            <textarea id="qr-text" placeholder="https://example.com or any text..."></textarea>
                        </div>

                        <div class="qr-options-grid">
                            <div class="input-group">
                                <label for="qr-color-dark">QR Color</label>
                                <div class="color-picker-wrapper">
                                    <input type="color" id="qr-color-dark" value="#000000" />
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="qr-color-light">Background</label>
                                <div class="color-picker-wrapper">
                                    <input type="color" id="qr-color-light" value="#ffffff" />
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="qr-size">Size (px)</label>
                                <select id="qr-size">
                                    <option value="128">128 x 128</option>
                                    <option value="256" selected>256 x 256</option>
                                    <option value="512">512 x 512</option>
                                    <option value="1024">1024 x 1024</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label for="qr-margin">Margin</label>
                                <input type="number" id="qr-margin" value="4" min="0" max="20" />
                            </div>
                        </div>
                    </div>

                    <div class="qr-preview-section">
                        <div class="qr-preview-card">
                            <div id="qr-preview-canvas-container">
                                <!-- Canvas will be rendered here -->
                                <div id="qr-placeholder" class="qr-placeholder">
                                    <span>Enter content to preview</span>
                                </div>
                            </div>
                            <div class="qr-download-actions">
                                <button id="btn-download-qr" class="primary-btn" disabled>Download PNG</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 bitlyx | Simple Development Tools</p>
        </footer>
    </div>
    <script type="module" src="/main.js"></script>
</body>

</html>
